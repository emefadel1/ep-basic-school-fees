<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>Offline - E.P Basic School Fees</title>
    <style>
      body { font-family: Arial, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
      .wrap { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
      .card { width: 100%; max-width: 560px; background: #ffffff; border: 1px solid #cbd5e1; border-radius: 24px; padding: 32px; box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12); }
      .eyebrow { font-size: 12px; letter-spacing: 0.24em; text-transform: uppercase; color: #475569; font-weight: 700; }
      h1 { margin: 12px 0 0; font-size: 32px; }
      p { line-height: 1.6; color: #334155; }
      .actions { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px; }
      button, a { border: 0; border-radius: 999px; padding: 12px 18px; font-weight: 700; text-decoration: none; cursor: pointer; }
      .primary { background: #0f172a; color: #ffffff; }
      .secondary { background: #e2e8f0; color: #0f172a; }
      .status { margin-top: 20px; padding: 14px 16px; background: #eff6ff; border-radius: 18px; color: #1e3a8a; }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <div class="eyebrow">Offline mode</div>
        <h1>You are offline</h1>
        <p>The app shell is still available. Cached pages and selected read-only data may continue to work, and eligible fee collection submissions can wait for a later sync.</p>
        <div id="pending" class="status">Checking pending sync items...</div>
        <div class="actions">
          <button id="retry" class="primary" type="button">Try again</button>
          <a href="/" class="secondary">Continue offline</a>
        </div>
      </div>
    </div>
    <script>
      var DB_NAME = "ep-basic-offline";
      var STORE_NAME = "pending-requests";
      var pendingNode = document.getElementById("pending");
      function renderPending(count) {
        var label = count === 1 ? "1 request is waiting to sync." : String(count) + " requests are waiting to sync.";
        if (count === 0) {
          label = "No pending sync items were found on this device.";
        }
        pendingNode.textContent = label;
      }
      function loadPendingCount() {
        if (window.indexedDB === undefined) {
          pendingNode.textContent = "Offline queue storage is unavailable in this browser.";
          return;
        }
        var request = window.indexedDB.open(DB_NAME, 1);
        request.onupgradeneeded = function onUpgrade(event) {
          var db = event.target.result;
          if (db.objectStoreNames.contains(STORE_NAME) === false) {
            db.createObjectStore(STORE_NAME, { keyPath: "id" });
          }
        };
        request.onsuccess = function onSuccess(event) {
          var db = event.target.result;
          var transaction = db.transaction(STORE_NAME, "readonly");
          transaction.objectStore(STORE_NAME).count().onsuccess = function onCount(countEvent) {
            renderPending(countEvent.target.result || 0);
          };
        };
        request.onerror = function onError() {
          pendingNode.textContent = "Could not inspect pending sync items.";
        };
      }
      document.getElementById("retry").addEventListener("click", function onRetry() {
        window.location.reload();
      });
      window.addEventListener("online", function onOnline() {
        window.location.href = "/";
      });
      loadPendingCount();
    </script>
  </body>
</html>
