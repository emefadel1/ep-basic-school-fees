server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 10m;

    gzip on;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        application/xml+rss
        image/svg+xml;

    location /static/ {
        alias /var/www/static/;
        expires 7d;
        access_log off;
    }

    location /media/ {
        alias /var/www/media/;
        expires 7d;
        access_log off;
    }

    # Nginx-owned health checks (always 200)
    location = /health {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location = /health/ {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Keep metrics on app (optional)
    location = /metrics {
        proxy_pass http://web:8000/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location = /metrics/ {
        proxy_pass http://web:8000/metrics/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}